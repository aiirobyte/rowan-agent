name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # Build all platform binaries from a single Linux runner (cross-compilation)
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            asset: rowan-linux-x64
            ext: .tar.gz
          - target: bun-linux-arm64
            asset: rowan-linux-arm64
            ext: .tar.gz
          - target: bun-darwin-x64
            asset: rowan-darwin-x64
            ext: .tar.gz
          - target: bun-darwin-arm64
            asset: rowan-darwin-arm64
            ext: .tar.gz
          - target: bun-windows-x64
            asset: rowan-windows-x64
            ext: .zip
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p dist
          bun build --compile --target=${{ matrix.target }} --outfile dist/rowan packages/cli/src/cli.ts
        env:
          NODE_ENV: production

      - name: Package (tar.gz)
        if: matrix.ext == '.tar.gz'
        run: |
          cd dist
          tar czf ../${{ matrix.asset }}${{ matrix.ext }} *

      - name: Package (zip)
        if: matrix.ext == '.zip'
        run: |
          cd dist
          zip -r ../${{ matrix.asset }}${{ matrix.ext }} *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}${{ matrix.ext }}

  # Generate checksums
  checksums:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f | while read -r f; do
            mv "$f" "$(basename "$f")"
          done
          find . -type d -empty -delete
          sha256sum * > checksums.txt

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: artifacts/checksums.txt

  # Create GitHub Release with all artifacts
  create-release:
    needs: [build-binaries, checksums]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate changelog
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          echo "**Full Changelog**: https://github.com/${REPO}/commits/${TAG}" > RELEASE_BODY.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_BODY.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
          files: release-assets/*

  # Publish to npm
  publish-npm:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build:packages

      - name: Debug npm auth
        run: |
          npm --version
          npm whoami 2>&1 || echo "Not authenticated via whoami"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL=${ACTIONS_ID_TOKEN_REQUEST_URL:+set}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN=${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+set}"

      - name: Publish packages
        run: bun run publish:packages
