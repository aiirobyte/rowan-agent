name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # Create GitHub Release with changelog
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=${{ steps.prev_tag.outputs.prev_tag }}

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            git log --pretty=format:"- %s (%h)" --no-merges > RELEASE_BODY.md
          else
            echo "## Changes since $PREV_TAG" > RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md

            FEATURES=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s (%h)" --no-merges --grep="^feat" || true)
            if [ -n "$FEATURES" ]; then
              echo "### 🚀 Features" >> RELEASE_BODY.md
              echo "$FEATURES" >> RELEASE_BODY.md
              echo "" >> RELEASE_BODY.md
            fi

            FIXES=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s (%h)" --no-merges --grep="^fix" || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes" >> RELEASE_BODY.md
              echo "$FIXES" >> RELEASE_BODY.md
              echo "" >> RELEASE_BODY.md
            fi

            OTHERS=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s (%h)" --no-merges --invert-grep --grep="^feat" --invert-grep --grep="^fix" || true)
            if [ -n "$OTHERS" ]; then
              echo "### 📦 Other Changes" >> RELEASE_BODY.md
              echo "$OTHERS" >> RELEASE_BODY.md
              echo "" >> RELEASE_BODY.md
            fi
          fi

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_BODY.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}

  # Build platform binaries
  build-binaries:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-13
            target: darwin-x64
          - os: macos-latest
            target: darwin-arm64
          - os: windows-latest
            target: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p dist
          bun build --compile --outfile dist/rowan packages/cli/src/cli.ts
        env:
          NODE_ENV: production

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar czf ../rowan-${{ matrix.target }}.tar.gz *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/* -DestinationPath rowan-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rowan-${{ matrix.target }}
          path: rowan-${{ matrix.target }}*

  # Publish to npm
  publish-npm:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build:packages

      - name: Publish to npm
        run: bun run publish:packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Upload binaries to GitHub Release
  upload-release:
    needs: [create-release, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
